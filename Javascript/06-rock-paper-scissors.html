<!DOCTYPE html>
<html>
  <head>
    <title>Rock Papers scissors</title>
    <style>

    </style>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    let randomNumber1=Math.random();
    if(randomNumber1>=0 && randomNumber1<1/3)
    {
      console.log('Rock');
    }">Rock</button>
    <button onclick="
    let randomNumber2=Math.random();
    if(randomNumber2>=1/3 && randomNumber2<2/3)
    {
      console.log('Paper');
    }">Paper</button>
    <button onclick="
    let randomNumber3=Math.random();
    if(randomNumber3>=2/3 && randomNumber3==1)
    {
      console.log('Scissors');
    }">Scissors</button>
  </body>
</html>
