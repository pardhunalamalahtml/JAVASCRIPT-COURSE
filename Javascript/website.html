<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML CSS Review</title>
  <style>
    .red-button
    {
      background-color:red;
      color:white;
      border:none;
      cursor:pointer;
    }
    .yellow-button
    {
      background-color:yellow;
      color:black;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <button title="Good job!" class="red-button" onclick="alert('Good job!');">
    Hello
  </button>
  <p>
    paragraph of <button class="yellow-button" onclick="alert('This is yellow button');">hello</button>text
  </p>
  <script>
    alert('hello');
    console.log(2+2);
  </script>
</body>
</html>
