<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5h Exercise</title>
</head>
<body>
  <button class="one">
    Show quantity
  </button>
  <button onclick="
  cartQuantity+=1;
  console.log(`cartquantity:$${cartQuantity}`);" class="two">
    Add to cart
  </button>
  <button onclick="
  cartQuantity+=2;
  console.log(`cartquantity:$${cartQuantity}`);" class="three">
    2  
  </button>
  <button onclick="
  cartQuantity+=3;
  console.log(`cartquantity:$${cartQuantity}`);" class="four">
    3  
  </button>
  <button onclick="
  cartQuantity+=4;
  console.log(`cartquantity:$${cartQuantity}`);" class="five">
    4  
  </button>
  <button onclick="
  cartQuantity+=5;
  console.log(`cartquantity:$${cartQuantity}`);" class="six">
    5  
  </button>
  <button onclick="
  cartQuantity=0;
  console.log(`cartquantity:$${cartQuantity}`);" class="reset">
    reset
  </button>
  <button onclick="
  if(cartQuantity===0){
  console.log('No items in cart to remove')
  }
  else{
  cartQuantity-=1;
  console.log(`cartquantity:$${cartQuantity}`);
  }" class="remove">
    Remove from cart
  </button>
  <button onclick="
  cartQuantity-=2;
  console.log(`cartquantity:$${cartQuantity}`);" class="seven">
    -2
  </button>
  <button onclick="
  cartQuantity-=3;
  console.log(`cartquantity:$${cartQuantity}`);" class="eight">
    -3
  </button>
  <script>
    let cartQuantity=0;
  </script>
