<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6l Exercise</title>
</head>
<body>
  <button class="one">
    Show quantity
  </button>
  <button onclick="
  if(cartQuantity+1>10){
  alert('The cart is full');
  }
  else{
  cartQuantity+=1;
  console.log(`cartquantity:$${cartQuantity}`); }" class="two">
    Add to cart
  </button>
  <button onclick="
  if(cartQuantity+2>10){
  alert('The cart is full');
  }
  else{
  cartQuantity+=2;
  console.log(`cartquantity:$${cartQuantity}`); }" class="three">
    +2  
  </button>
  <button onclick="
  if(cartQuantity+3>10){
  alert('The cart is full');
  }
  else{
  cartQuantity+=3;
  console.log(`cartquantity:$${cartQuantity}`); }" class="four">
    +3  
  </button>
  <button onclick="
  if(cartQuantity+4>10){
  alert('The cart is full');
  }
  else{
  cartQuantity+=4;
  console.log(`cartquantity:$${cartQuantity}`); }" class="five">
    4  
  </button>
  <button onclick="
  if(cartQuantity+5>10){
  alert('The cart is full');
  }
  else{
  cartQuantity+=5;
  console.log(`cartquantity:$${cartQuantity}`); }" class="six">
    +5  
  </button>
  <button onclick="
  if(cartQuantity===0){
  alert('Not enough items in the cart');
  }
  else{
  cartQuantity=0;
  console.log('Cart was reset.');
  console.log(`cartquantity:$${cartQuantity}`); }" class="reset">
    reset
  </button>
  <button onclick="
  if(cartQuantity-1<0){
  console.log('Not enough items in the cart');
  }
  else{
  cartQuantity-=1;
  console.log(`cartquantity:$${cartQuantity}`);
  }" class="remove">
    Remove from cart
  </button>
  <button onclick="
  if(cartQuantity-2<0){
  console.log('Not enough items in the cart');
  }
  else{
  cartQuantity-=2;
  console.log(`cartquantity:$${cartQuantity}`);
  }" class="seven">
    -2
  </button>
  <button onclick="
  if(cartQuantity-3<0){
  console.log('Not enough items in the cart');
  }
  else{
  cartQuantity-=3;
  console.log(`cartquantity:$${cartQuantity}`);
  }" class="eight">
    -3
  </button>
  <script>
    let cartQuantity=0;
  </script>
</body>
</html>
